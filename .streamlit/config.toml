[server]
maxUploadSize = 5
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#2196F3"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1a2e"
textColor = "#e0e0e0"

[client]
toolbarMode = "minimal"
showErrorDetails = false
